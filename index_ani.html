<!DOCTYPE html>
<html>
<head>
<title>Centered Heart Animation</title>

<style>

/* Center content on screen */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;  /* Horizontal center */
  align-items: center;      /* Vertical center */
  background: black;
}

/* Animation */
@keyframes moveHeart {
  from { transform: translateX(0) rotate(-45deg); }
  to   { transform: translateX(200px) rotate(-45deg); }
}

/* Heart shape */
.heart {
  position: relative;
  width: 100px;
  height: 100px;
  background: red;
  transform: rotate(-45deg);

  animation-name: moveHeart;
  animation-duration: 3s;
  animation-delay: 1s;
  animation-iteration-count: infinite;
  animation-direction: alternate;
}

/* Left circle */
.heart::before {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background: red;
  border-radius: 50%;
  top: -50px;
  left: 0;
}

/* Right circle */
.heart::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  background: red;
  border-radius: 50%;
  top: 0;
  left: 50px;
}

</style>
</head>

<body>

<div class="heart"></div>

</body>
</html>
